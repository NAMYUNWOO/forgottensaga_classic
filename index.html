<!doctype html>
<html lang="ko">
  <head>
    <!-- COOP/COEP for SharedArrayBuffer (love.js normal mode 요구).
         GitHub Pages 가 직접 헤더 보내지 않으므로 service worker 가 fetch event
         에 inject. https://github.com/gzuidhof/coi-serviceworker -->
    <script src="coi-serviceworker.js?v=20260510022322"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=overlays-content">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>포가튼사가</title>
    <link rel="icon" type="image/png" href="favicon.png?v=20260510022322">
    <link rel="stylesheet" type="text/css" href="theme/love.css?v=20260510022322">
    <link rel="stylesheet" type="text/css" href="mobile_input.css?v=20260510022322">
    <link rel="stylesheet" type="text/css" href="save_controls.css?v=20260510022322">
    <style>
      /* body / html 자체를 viewport 에 고정 — 키보드 등장 시 visual viewport 가
       * 위로 밀려도 layout viewport 와 fixed body 는 그대로. JS 가 --vh-fixed CSS
       * variable 으로 initial height 캡처. */
      html, body {
        margin: 0; padding: 0;
        background: #000;
        overflow: hidden;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100%;
        height: 100%;
      }
      #canvas { display: block; margin: 0 auto; outline: none; }
      h1, footer { display: none; }
      /* PC default: 화면 가운데 정렬 (vertical + horizontal).
       * mobile (touch / 작은 viewport) 은 column + 위 시작 + padding-top.
       * mobile media query 를 inline 안에 두는 이유: mobile_input.css 가 inline 보다
       * 먼저 load 되므로 외부 css 의 override 는 specifity 동일 시 적용 안 됨. */
      .game-wrap {
          /* fixed body 안에서 100% — body 가 viewport 고정이니 game-wrap 도 고정. */
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          width: 100%;
          height: 100%;
          display: flex;
          /* PC: vertical center 보다 약간 위로 (브라우저 도구바 시각 보정).
           * flex-start + padding-top 8vh → 화면 위에서 8% 여백 후 시작. */
          align-items: flex-start;
          justify-content: center;
          padding-top: 8vh;
      }
      @media (pointer: coarse), (max-width: 1024px) {
          .game-wrap {
              flex-direction: column;
              align-items: center;          /* column mode: horizontal center */
              justify-content: flex-start;  /* column mode: top start */
              padding-top: 44px;            /* PC 8vh override */
          }
      }

      /* Splash overlay — main.lua love.load() 동안 표시. CSS animation 은 별도 GPU
         pipeline 이라 Lua main thread block 시에도 spinner 회전 유지. */
      #splash-overlay {
        position: absolute; inset: 0; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgb(20, 20, 30); color: #fff;
        font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        transition: opacity 0.3s; pointer-events: none;
      }
      #splash-overlay.hidden { opacity: 0; pointer-events: none; }
      #splash-title {
        color: rgb(255, 213, 102);
        font-size: 2.2em; font-weight: 700; letter-spacing: 0.05em;
        margin-bottom: 28px;
      }
      #splash-spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(255, 213, 102, 0.2);
        border-top-color: rgb(255, 213, 102);
        border-radius: 50%;
        animation: splash-spin 0.9s linear infinite;
        margin-bottom: 22px;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      #splash-text {
        color: rgb(180, 180, 200);
        font-size: 1.05em;
        letter-spacing: 0.02em;
      }
      #splash-substatus {
        color: rgb(120, 120, 140);
        font-size: 0.85em;
        margin-top: 8px;
        min-height: 1.2em;
      }

      /* Audio prompt — 브라우저 autoplay 정책으로 첫 user gesture 전엔 사운드 silent.
       * splash 후 표시되어 사용자 클릭 받으면 AudioContext.resume() 으로 활성. */
      #audio-prompt {
        position: fixed; inset: 0;
        z-index: 180;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        cursor: pointer;
        transition: opacity 0.3s;
        animation: ap-fadein 0.3s ease-out;
      }
      #audio-prompt.hidden { opacity: 0; pointer-events: none; }
      #audio-prompt .ap-card {
        background: rgba(20, 20, 30, 0.96);
        border: 3px solid rgba(255, 213, 102, 0.7);
        border-radius: 14px;
        padding: 32px 40px;
        text-align: center;
        color: #ffd566;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.6);
        animation: ap-pulse 1.6s ease-in-out infinite;
      }
      #audio-prompt .ap-icon {
        font-size: 3.5em;
        margin-bottom: 14px;
      }
      #audio-prompt .ap-text {
        font-size: 1.1em;
        line-height: 1.5;
        color: #fff;
      }
      #audio-prompt .ap-sub {
        font-size: 0.85em;
        color: #aaa;
        margin-top: 8px;
      }
      @keyframes ap-fadein {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes ap-pulse {
        0%, 100% { box-shadow: 0 8px 28px rgba(0, 0, 0, 0.6), 0 0 0 0 rgba(255, 213, 102, 0.5); }
        50%      { box-shadow: 0 8px 28px rgba(0, 0, 0, 0.6), 0 0 0 14px rgba(255, 213, 102, 0); }
      }
    </style>
  </head>
  <body>
    <div class="game-wrap">
      <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()" width="800" height="600" style="display:none"></canvas>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

      <!-- Splash: main.lua love.load() 끝까지 표시 (BGM preload 1-3초 흡수). -->
      <div id="splash-overlay">
        <div id="splash-title">포가튼사가</div>
        <div id="splash-spinner"></div>
        <div id="splash-text">로딩 중...</div>
        <div id="splash-substatus">자산 다운로드 중...</div>
      </div>

      <!-- Audio prompt: splash 후 표시. 사용자 클릭으로 AudioContext.resume() →
           브라우저 autoplay 정책 회피. 클릭 후 hide. -->
      <div id="audio-prompt" class="hidden">
        <div class="ap-card">
          <div class="ap-icon">🔊</div>
          <div class="ap-text">사운드 활성을 위해<br>여기를 클릭하세요</div>
          <div class="ap-sub">브라우저 정책으로 사용자 입력 후 사운드 재생 가능</div>
        </div>
      </div>

      <!-- 우상단 controls — PC + mobile 둘 다 표시 (mobile 에선 키패드 위 row 로 이동) -->
      <div class="top-right">
        <button class="btn" id="btn-ime">키보드</button>
        <button class="btn" id="btn-fullscreen">전체화면</button>
        <button class="btn" id="btn-sound" title="사운드 ON/OFF">🔊 사운드</button>
        <button class="btn" id="btn-save">💾 세이브</button>
      </div>

      <div id="save-panel" class="hidden">
        <button class="close-btn">✕</button>
        <h2>세이브 슬롯 관리</h2>
        <div id="save-slots"></div>
        <div id="save-status">대기 중…</div>
        <p style="font-size:11px;color:#888;margin-top:14px">
          저장된 sav 는 브라우저 IndexedDB 에 보관됩니다.<br>
          다운로드로 백업, 업로드로 복원 가능.
        </p>
      </div>

      <!-- 모바일 가상 키패드 (touch 디바이스에서만 표시, CSS 분기) -->
      <div id="mobile-input">
        <input id="mobile-ime" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="👆 여기를 터치하여 키보드 입력">

        <!-- 좌하단 조이스틱: 4방향 키 emulation. drag 위치 → angle 으로 방향 dispatch. -->
        <div class="joystick" id="joystick">
          <div class="joystick-base"></div>
          <div class="joystick-knob" id="joystick-knob"></div>
        </div>

        <!-- 우하단 액션: esc 위, space-enter 좌우. -->
        <div class="actions">
          <div class="row top">
            <button class="btn esc" data-key="esc">esc</button>
          </div>
          <div class="row bottom">
            <button class="btn space" data-key="space">space</button>
            <button class="btn enter" data-key="enter">enter</button>
          </div>
        </div>

      </div>
    </div>

    <script type='text/javascript'>
      function goFullScreen() {
        var canvas = document.getElementById("canvas");
        if (canvas.requestFullscreen) canvas.requestFullscreen();
        else if (canvas.webkitRequestFullScreen) canvas.webkitRequestFullScreen();
      }
      // Splash overlay 의 substatus 텍스트만 update (text 는 "로딩 중..." 고정).
      function setSplashSubstatus(text) {
        var el = document.getElementById('splash-substatus');
        if (el) el.textContent = text || '';
      }
      function hideSplash() {
        var s = document.getElementById('splash-overlay');
        if (s) {
          s.classList.add('hidden');
          // transition 끝나면 DOM 제거 (mobile-input 등 z-index 충돌 방지)
          setTimeout(function() {
            if (s.parentNode) s.parentNode.removeChild(s);
            // Audio prompt 표시 — autoUnlocked 면 skip
            if (!window.__audioUnlocked) {
              var ap = document.getElementById('audio-prompt');
              if (ap) ap.classList.remove('hidden');
            }
          }, 400);
        }
      }
      // Audio context unlock — 사용자 첫 gesture (click/touch/key) 후 호출.
      // AudioContext.resume() + audio prompt hide. 단 1회만.
      function unlockAudio() {
        if (window.__audioUnlocked) return;
        window.__audioUnlocked = true;
        try {
          if (window.Module && window.Module.SDL2 && window.Module.SDL2.audioContext) {
            var ctx = window.Module.SDL2.audioContext;
            if (ctx.state === 'suspended') ctx.resume();
          }
        } catch(e) {}
        var ap = document.getElementById('audio-prompt');
        if (ap) {
          ap.classList.add('hidden');
          setTimeout(function() { if (ap.parentNode) ap.parentNode.removeChild(ap); }, 400);
        }
      }
      // Document-wide listener — splash 후에도 사용자가 prompt 안 보고 직접 게임에
      // 입력하면 (조이스틱 등) 그 첫 gesture 로 audio unlock.
      ['click', 'touchstart', 'keydown'].forEach(function(ev) {
        document.addEventListener(ev, unlockAudio, { capture: true });
      });

      // 모바일 키보드 등장/dismiss 시 visualViewport 가 위로 밀린 채 회복 안 되는
      // issue 회피. visualViewport.resize 마다 window.scrollTo(0, 0) 강제.
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
          window.scrollTo(0, 0);
          document.documentElement.scrollTop = 0;
          document.body.scrollTop = 0;
        });
      }
      // orientation change 후 가능한 빨리 scroll reset
      window.addEventListener('orientationchange', function() {
        setTimeout(function() {
          window.scrollTo(0, 0);
        }, 200);
      });
      // Lua side 에서 print() sentinel 보내면 splash hide.
      window.LOVE2D_BOOT_DONE_SENTINEL = "LOVE2D_BOOT_DONE";

      // Sav download trigger — Lua 가 보낸 chunk 모음을 blob 으로 사용자에게 전달.
      // iOS Safari 의 download attribute 미지원 회피 위해 navigator.share 우선 시도.
      function triggerSavDownload(dl) {
        var b64 = dl.chunks.join('');
        var bin = atob(b64);
        var u8 = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
        var slotPad = ('0' + dl.slot).slice(-2);
        var filename = 'saga' + slotPad + '.sav';
        var blob = new Blob([u8], { type: 'application/octet-stream' });
        // 1순위: Web Share API (iOS / Android 모두 native file 저장 / 공유 가능)
        try {
          var file = new File([blob], filename, { type: 'application/octet-stream' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            navigator.share({ files: [file], title: '포가튼사가 세이브' })
              .catch(function(e) { console.warn('share fail, fallback to <a>:', e); fallbackDownload(); });
            return;
          }
        } catch (e) {}
        // 2순위: <a download> (Android Chrome / desktop)
        function fallbackDownload() {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = filename;
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(function() {
            a.remove();
            URL.revokeObjectURL(url);
          }, 1000);
        }
        fallbackDownload();
        if (window.SaveControls && window.SaveControls.setStatus) {
          window.SaveControls.setStatus('Slot ' + dl.slot + ': 다운로드 (' + u8.length + ' byte)', 'success');
        }
      }

      // Sound toggle — 모바일 autoplay 정책 회피 (사용자 첫 gesture 후 audio context
       // resume) + Lua 측 mute toggle (F10 key dispatch). 동작:
       //   1. Web Audio context 가 suspended 면 resume() (브라우저 첫 user gesture)
       //   2. Lua 가 F10 받으면 Sound.mute / Sound.unmute toggle
       //   3. button label 갱신 (🔊 / 🔇)
      function toggleSound() {
        var btn = document.getElementById('btn-sound');
        if (!btn) return;
        // 1. AudioContext resume (모바일 autoplay 차단 해제)
        try {
          if (window.Module && window.Module.SDL2 && window.Module.SDL2.audioContext) {
            window.Module.SDL2.audioContext.resume();
          }
        } catch (e) {}
        // 2. F10 keyboard event dispatch (Lua 가 Sound.mute toggle)
        var canvas = document.getElementById('canvas') || window;
        var ev = new KeyboardEvent('keydown', {
          key: 'F10', code: 'F10', keyCode: 121, which: 121,
          bubbles: true, cancelable: true,
        });
        canvas.dispatchEvent(ev);
        var ev2 = new KeyboardEvent('keyup', {
          key: 'F10', code: 'F10', keyCode: 121, which: 121,
          bubbles: true, cancelable: true,
        });
        canvas.dispatchEvent(ev2);
        // 3. label 토글
        if (btn.dataset.muted === '1') {
          btn.dataset.muted = '0';
          btn.textContent = '🔊 사운드';
          btn.classList.remove('muted');
        } else {
          btn.dataset.muted = '1';
          btn.textContent = '🔇 음소거';
          btn.classList.add('muted');
        }
      }

      window.onload = function () {
        window.focus();
        if (window.MobileInput) MobileInput.install();
        if (window.SaveControls) SaveControls.install();
        var fbtn = document.getElementById('btn-fullscreen');
        if (fbtn) fbtn.addEventListener('click', goFullScreen);
        var sbtn = document.getElementById('btn-sound');
        if (sbtn) sbtn.addEventListener('click', toggleSound);
      };

      // 화살표/스페이스 default browser scroll 방지
      window.addEventListener("keydown", function(e) {
        if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
      }, false);

      // sessionStorage 에 SaveControls 가 저장한 pending uploads 를 MEMFS 에 inject.
      // emscripten IDBFS 의 reconcile 동작 (MEMFS = source-of-truth) 을 우회 위해
      // game runtime 의 MEMFS 에 직접 file 생성 → syncfs(false) 시 IDBFS 에 sync.
      function preRunInjectUploads() {
        // 영속 (localStorage) + sessionStorage 둘 다 수집 (sessionStorage 우선
        // 처리, 실패 시 localStorage). localStorage 는 사용자가 수동 clear 까지 유지.
        var pending = [];
        try {
          var raw1 = sessionStorage.getItem('love2d_pending_uploads');
          if (raw1) {
            sessionStorage.removeItem('love2d_pending_uploads');
            var arr1 = JSON.parse(raw1);
            for (var i = 0; i < arr1.length; i++) pending.push(arr1[i]);
          }
        } catch (e) { console.warn('[preRun] sessionStorage error:', e); }
        // localStorage 의 slot-specific keys (love2d_upload_slot_N)
        try {
          for (var slot = 0; slot <= 5; slot++) {
            var raw2 = localStorage.getItem('love2d_upload_slot_' + slot);
            if (!raw2) continue;
            var item = JSON.parse(raw2);
            // 이미 sessionStorage 에 같은 path 있으면 skip (중복 방지)
            var dup = false;
            for (var j = 0; j < pending.length; j++) {
              if (pending[j].path === item.path) { dup = true; break; }
            }
            if (!dup) pending.push(item);
          }
        } catch (e) { console.warn('[preRun] localStorage error:', e); }

        if (!pending.length) return;
        console.log('[preRun] called, Module keys:', Object.keys(Module).slice(0, 30));
        console.log('[preRun] pending count:', pending.length);
        try {
          for (var i = 0; i < pending.length; i++) {
            var item = pending[i];
            var bin = atob(item.b64);
            var u8 = new Uint8Array(bin.length);
            for (var j = 0; j < bin.length; j++) u8[j] = bin.charCodeAt(j);
            // path 의 parent dir 자동 생성
            var parts = item.path.split('/').filter(function(s) { return s.length > 0; });
            var fname = parts.pop();
            var parent = '';
            for (var k = 0; k < parts.length; k++) {
              try {
                if (Module.FS_createFolder) Module.FS_createFolder(parent || '/', parts[k], true, true);
                else if (Module.FS && Module.FS.mkdir) Module.FS.mkdir((parent || '') + '/' + parts[k]);
              } catch (e) { /* 이미 존재 */ }
              parent = (parent || '') + '/' + parts[k];
            }
            // file 생성
            try {
              if (Module.FS_createDataFile) {
                Module.FS_createDataFile(parent || '/', fname, u8, true, true, true);
              } else if (Module.FS && Module.FS.writeFile) {
                Module.FS.writeFile(parent + '/' + fname, u8);
              } else {
                console.warn('[preRun] MEMFS inject API 없음');
                return;
              }
              console.log('[preRun] sav inject:', item.path, u8.length, 'bytes');
            } catch (e) {
              console.warn('[preRun] inject 실패:', item.path, e);
            }
          }
        } catch (e) {
          console.warn('[preRun] pending uploads 처리 오류:', e);
        }
      }

      var Module = {
        arguments: ["./game.love"],
        INITIAL_MEMORY: 268435456,
        preRun: [preRunInjectUploads],
        printErr: console.error.bind(console),
        // Lua print() 의 sentinel 감시.
        print: function(text) {
          var trimmed = (text || '').replace(/[\r\n]+$/, '').trim();
          if (trimmed === window.LOVE2D_BOOT_DONE_SENTINEL) {
            hideSplash();
            return;
          }
          var sdMatch = trimmed.match(/^\[SAVE_DIR\]\s+(.+)$/);
          if (sdMatch) {
            window.LOVE2D_SAVE_DIR = sdMatch[1];
            if (window.SaveControls && window.SaveControls.setSaveDir) {
              window.SaveControls.setSaveDir(sdMatch[1]);
            }
            console.log('[SaveControls] save dir from Lua:', sdMatch[1]);
            return;
          }
          // Sav 다운로드 bridge — Lua 가 base64 chunk 으로 forward
          var beginM = trimmed.match(/^\[SAV_DOWNLOAD_BEGIN\]\s+(\d+)\s+(\d+)$/);
          if (beginM) {
            window.__savDl = { slot: beginM[1], totalLen: parseInt(beginM[2]), chunks: [] };
            return;
          }
          var chunkM = trimmed.match(/^\[SAV_DOWNLOAD_CHUNK\]\s+(.+)$/);
          if (chunkM && window.__savDl) {
            window.__savDl.chunks.push(chunkM[1]);
            return;
          }
          if (trimmed === '[SAV_DOWNLOAD_END]' && window.__savDl) {
            triggerSavDownload(window.__savDl);
            window.__savDl = null;
            return;
          }
          var errM = trimmed.match(/^\[SAV_DOWNLOAD_ERR\]\s+(\d+)\s+(.+)$/);
          if (errM) {
            window.__savDl = null;
            console.warn('[SaveControls] download error slot ' + errM[1] + ': ' + errM[2]);
            if (window.SaveControls && window.SaveControls.setStatus) {
              window.SaveControls.setStatus('Slot ' + errM[1] + ': ' + errM[2], 'error');
            }
            return;
          }
          console.log(text);
        },
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) {
            alert('WebGL context lost. 페이지를 새로고침해 주세요.');
            e.preventDefault();
          }, false);
          return canvas;
        })(),
        // setStatus: dependency loading phase 의 substatus update 만 — splash hide 는
        // Lua sentinel print() 가 trigger (main.lua love.load() 의 BGM preload 후).
        setStatus: function(text) {
          if (text) setSplashSubstatus(text);
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function(left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left > 0) {
            setSplashSubstatus('자산 로딩 (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')');
          } else {
            // 자산 로딩 끝 → main.lua 시작 (그 동안 BGM preload 동기 block, splash 유지).
            setSplashSubstatus('사운드 디코딩 중...');
            // Canvas visibility: love.js default 가 hidden 이라 명시 visible 필요.
            // splash overlay 가 위에 z-index:10 으로 가려서 사용자에겐 splash 만 보임.
            document.getElementById('canvas').style.visibility = 'visible';
          }
        },
      };
      Module.setStatus('자산 다운로드 중...');
      window.onerror = function(event) {
        Module.setStatus('오류 발생 — JavaScript console 확인');
        Module.setStatus = function(text) {
          if (text) Module.printErr('[post-exception status] ' + text);
        };
      };

      var applicationLoad = function(e) { Love(Module); };
    </script>
