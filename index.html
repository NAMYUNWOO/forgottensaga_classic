<!doctype html>
<html lang="ko">
  <head>
    <!-- COOP/COEP for SharedArrayBuffer (love.js normal mode 요구).
         GitHub Pages 가 직접 헤더 보내지 않으므로 service worker 가 fetch event
         에 inject. https://github.com/gzuidhof/coi-serviceworker -->
    <script src="coi-serviceworker.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>포가튼사가</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" type="text/css" href="theme/love.css">
    <link rel="stylesheet" type="text/css" href="mobile_input.css">
    <link rel="stylesheet" type="text/css" href="save_controls.css">
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background: #000; }
      #canvas { display: block; margin: 0 auto; outline: none; }
      h1, footer { display: none; }
      /* PC default: 화면 가운데 정렬 (vertical + horizontal).
       * mobile (touch / 작은 viewport) 은 column + 위 시작 + padding-top.
       * mobile media query 를 inline 안에 두는 이유: mobile_input.css 가 inline 보다
       * 먼저 load 되므로 외부 css 의 override 는 specifity 동일 시 적용 안 됨. */
      .game-wrap {
          position: relative;
          width: 100vw;
          height: 100vh;
          display: flex;
          /* PC: vertical center 보다 약간 위로 (브라우저 도구바 시각 보정).
           * flex-start + padding-top 8vh → 화면 위에서 8% 여백 후 시작. */
          align-items: flex-start;
          justify-content: center;
          padding-top: 8vh;
      }
      @media (pointer: coarse), (max-width: 1024px) {
          .game-wrap {
              flex-direction: column;
              align-items: center;          /* column mode: horizontal center */
              justify-content: flex-start;  /* column mode: top start */
              padding-top: 44px;            /* PC 8vh override */
          }
      }

      /* Splash overlay — main.lua love.load() 동안 표시. CSS animation 은 별도 GPU
         pipeline 이라 Lua main thread block 시에도 spinner 회전 유지. */
      #splash-overlay {
        position: absolute; inset: 0; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgb(20, 20, 30); color: #fff;
        font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        transition: opacity 0.3s; pointer-events: none;
      }
      #splash-overlay.hidden { opacity: 0; pointer-events: none; }
      #splash-title {
        color: rgb(255, 213, 102);
        font-size: 2.2em; font-weight: 700; letter-spacing: 0.05em;
        margin-bottom: 28px;
      }
      #splash-spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(255, 213, 102, 0.2);
        border-top-color: rgb(255, 213, 102);
        border-radius: 50%;
        animation: splash-spin 0.9s linear infinite;
        margin-bottom: 22px;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      #splash-text {
        color: rgb(180, 180, 200);
        font-size: 1.05em;
        letter-spacing: 0.02em;
      }
      #splash-substatus {
        color: rgb(120, 120, 140);
        font-size: 0.85em;
        margin-top: 8px;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="game-wrap">
      <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()" width="800" height="600" style="display:none"></canvas>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

      <!-- Splash: main.lua love.load() 끝까지 표시 (BGM preload 1-3초 흡수). -->
      <div id="splash-overlay">
        <div id="splash-title">포가튼사가</div>
        <div id="splash-spinner"></div>
        <div id="splash-text">로딩 중...</div>
        <div id="splash-substatus">자산 다운로드 중...</div>
      </div>

      <!-- Save 컨트롤 (우상단 toggle + 패널) -->
      <button id="save-panel-toggle">💾 세이브</button>
      <div id="save-panel" class="hidden">
        <button class="close-btn">✕</button>
        <h2>세이브 슬롯 관리</h2>
        <div id="save-slots"></div>
        <div id="save-status">대기 중…</div>
        <p style="font-size:11px;color:#888;margin-top:14px">
          저장된 sav 는 브라우저 IndexedDB 에 보관됩니다.<br>
          다운로드로 백업, 업로드로 복원 가능.
        </p>
      </div>

      <!-- 모바일 가상 키패드 (touch 디바이스에서만 표시, CSS 분기) -->
      <div id="mobile-input">
        <input id="mobile-ime" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

        <!-- 좌하단 조이스틱: 4방향 키 emulation. drag 위치 → angle 으로 방향 dispatch. -->
        <div class="joystick" id="joystick">
          <div class="joystick-base"></div>
          <div class="joystick-knob" id="joystick-knob"></div>
        </div>

        <!-- 우하단 액션: esc 위, space-enter 좌우. -->
        <div class="actions">
          <div class="row top">
            <button class="btn esc" data-key="esc">esc</button>
          </div>
          <div class="row bottom">
            <button class="btn space" data-key="space">space</button>
            <button class="btn enter" data-key="enter">enter</button>
          </div>
        </div>

        <div class="top-right">
          <button class="btn" id="btn-ime">키보드</button>
          <button class="btn" id="btn-fullscreen">전체화면</button>
        </div>
      </div>
    </div>

    <script type='text/javascript'>
      function goFullScreen() {
        var canvas = document.getElementById("canvas");
        if (canvas.requestFullscreen) canvas.requestFullscreen();
        else if (canvas.webkitRequestFullScreen) canvas.webkitRequestFullScreen();
      }
      // Splash overlay 의 substatus 텍스트만 update (text 는 "로딩 중..." 고정).
      function setSplashSubstatus(text) {
        var el = document.getElementById('splash-substatus');
        if (el) el.textContent = text || '';
      }
      function hideSplash() {
        var s = document.getElementById('splash-overlay');
        if (s) {
          s.classList.add('hidden');
          // transition 끝나면 DOM 제거 (mobile-input 등 z-index 충돌 방지)
          setTimeout(function() { if (s.parentNode) s.parentNode.removeChild(s); }, 400);
        }
      }
      // Lua side 에서 print() sentinel 보내면 splash hide.
      window.LOVE2D_BOOT_DONE_SENTINEL = "LOVE2D_BOOT_DONE";

      window.onload = function () {
        window.focus();
        if (window.MobileInput) MobileInput.install();
        if (window.SaveControls) SaveControls.install();
        var fbtn = document.getElementById('btn-fullscreen');
        if (fbtn) fbtn.addEventListener('click', goFullScreen);
      };

      // 화살표/스페이스 default browser scroll 방지
      window.addEventListener("keydown", function(e) {
        if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
      }, false);

      // sessionStorage 에 SaveControls 가 저장한 pending uploads 를 MEMFS 에 inject.
      // emscripten IDBFS 의 reconcile 동작 (MEMFS = source-of-truth) 을 우회 위해
      // game runtime 의 MEMFS 에 직접 file 생성 → syncfs(false) 시 IDBFS 에 sync.
      function preRunInjectUploads() {
        console.log('[preRun] called, Module keys:', Object.keys(Module).slice(0, 30));
        try {
          var pending = JSON.parse(sessionStorage.getItem('love2d_pending_uploads') || '[]');
          console.log('[preRun] pending count:', pending.length);
          if (!pending.length) return;
          for (var i = 0; i < pending.length; i++) {
            var item = pending[i];
            var bin = atob(item.b64);
            var u8 = new Uint8Array(bin.length);
            for (var j = 0; j < bin.length; j++) u8[j] = bin.charCodeAt(j);
            // path 의 parent dir 자동 생성
            var parts = item.path.split('/').filter(function(s) { return s.length > 0; });
            var fname = parts.pop();
            var parent = '';
            for (var k = 0; k < parts.length; k++) {
              try {
                if (Module.FS_createFolder) Module.FS_createFolder(parent || '/', parts[k], true, true);
                else if (Module.FS && Module.FS.mkdir) Module.FS.mkdir((parent || '') + '/' + parts[k]);
              } catch (e) { /* 이미 존재 */ }
              parent = (parent || '') + '/' + parts[k];
            }
            // file 생성
            try {
              if (Module.FS_createDataFile) {
                Module.FS_createDataFile(parent || '/', fname, u8, true, true, true);
              } else if (Module.FS && Module.FS.writeFile) {
                Module.FS.writeFile(parent + '/' + fname, u8);
              } else {
                console.warn('[preRun] MEMFS inject API 없음');
                return;
              }
              console.log('[preRun] sav inject:', item.path, u8.length, 'bytes');
            } catch (e) {
              console.warn('[preRun] inject 실패:', item.path, e);
            }
          }
          sessionStorage.removeItem('love2d_pending_uploads');
        } catch (e) {
          console.warn('[preRun] pending uploads 처리 오류:', e);
        }
      }

      var Module = {
        arguments: ["./game.love"],
        INITIAL_MEMORY: 268435456,
        preRun: [preRunInjectUploads],
        printErr: console.error.bind(console),
        // Lua print() 의 sentinel 감시.
        //   LOVE2D_BOOT_DONE → splash hide
        //   [SAVE_DIR] <path> → SaveControls.setSaveDir(path)
        print: function(text) {
          var trimmed = (text || '').replace(/[\r\n]+$/, '').trim();
          if (trimmed === window.LOVE2D_BOOT_DONE_SENTINEL) {
            hideSplash();
            return;
          }
          var sdMatch = trimmed.match(/^\[SAVE_DIR\]\s+(.+)$/);
          if (sdMatch) {
            window.LOVE2D_SAVE_DIR = sdMatch[1];
            if (window.SaveControls && window.SaveControls.setSaveDir) {
              window.SaveControls.setSaveDir(sdMatch[1]);
            }
            console.log('[SaveControls] save dir from Lua:', sdMatch[1]);
            return;
          }
          console.log(text);
        },
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) {
            alert('WebGL context lost. 페이지를 새로고침해 주세요.');
            e.preventDefault();
          }, false);
          return canvas;
        })(),
        // setStatus: dependency loading phase 의 substatus update 만 — splash hide 는
        // Lua sentinel print() 가 trigger (main.lua love.load() 의 BGM preload 후).
        setStatus: function(text) {
          if (text) setSplashSubstatus(text);
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function(left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left > 0) {
            setSplashSubstatus('자산 로딩 (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')');
          } else {
            // 자산 로딩 끝 → main.lua 시작 (그 동안 BGM preload 동기 block, splash 유지).
            setSplashSubstatus('사운드 디코딩 중...');
            // Canvas visibility: love.js default 가 hidden 이라 명시 visible 필요.
            // splash overlay 가 위에 z-index:10 으로 가려서 사용자에겐 splash 만 보임.
            document.getElementById('canvas').style.visibility = 'visible';
          }
        },
      };
      Module.setStatus('자산 다운로드 중...');
      window.onerror = function(event) {
        Module.setStatus('오류 발생 — JavaScript console 확인');
        Module.setStatus = function(text) {
          if (text) Module.printErr('[post-exception status] ' + text);
        };
      };

      var applicationLoad = function(e) { Love(Module); };
    </script>
    <script type="text/javascript" src="mobile_input.js"></script>
    <script type="text/javascript" src="save_controls.js"></script>
    <script type="text/javascript" src="game.js"></script>
    <script async type="text/javascript" src="love.js" onload="applicationLoad(this)"></script>
  </body>
</html>
